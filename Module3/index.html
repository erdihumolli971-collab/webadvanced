<!DOCTYPE html>
<html>
    <head>
        <title>Tables and Lists</title>

        <style>
            table, th, td {

            border: 1px solid black;
            border-collapse: collapse;
            }

        </style>
    </head>
    <body>
<table>
 

<tr>
    <th>Firstname</th>
    <th>Lastname</th>
      <th>Age</th>
        <th>Email</th>
</tr>

<tbody>
<tr>
    <td>Eda</td>
      <td>Gashi</td>
        <td>22</td>
          <td>eda@gmail.com</td>
</tr>


<tr>
    <td>Rron</td>
      <td>Vitia</td>
        <td>14</td>
          <td>rron@gmail.com</td>
</tr>


<tr>
    <td>Buna</td>
      <td>Bakija</td>
        <td>13</td>
          <td>buna@gmail.com</td>
</tr>
</tbody>

<tfoot>
<tr>
    <td colspan="4">Table footer</td>
</tr>


</tfoot>
</table>


<br>
<hr>


<table>
 
    <tr>
      <th>Name:</th>
      <td>John Doe</td>
      <td>Richard Roe</td> 
    </tr>
      <th>Name:</th>
      <td>jondoe@gmail.com</td>
      <td rowspan="2">richardroe@gmail.com</td>
    </tr> 
     
    <tr>
        <td>johndoe@hotmail.com</td>
    </tr>
</table>

<hr>

<ul>
    <li>Neapolitan Pizza</li>
    <li>Margherita Pizza</li>
     <li>Prosciutto Pizza</li>

</ul>






    </body>
</html>
